openapi: 3.1.0
info:
  title: Data Foundation Architecture Agent API
  version: 0.1.0
  description: Read-only, model-neutral architecture tools for integration behind a company AI assistant.
paths:
  /v1/architecture-agent/tasks:
    post:
      operationId: runArchitectureAgentTask
      summary: Execute one governed read-only architecture operation.
      security:
        - oauth2: [architecture.read]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./schemas/request.schema.json
      responses:
        "200":
          description: Grounded architecture result.
          content:
            application/json:
              schema:
                $ref: ./schemas/result.schema.json
        "400":
          description: Invalid request.
        "401":
          description: Missing or invalid identity.
        "403":
          description: Purpose or scope is not permitted.
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://identity.example.invalid/oauth2/token
          scopes:
            architecture.read: Read architecture guidance and evidence.
