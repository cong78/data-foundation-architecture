site_name: Data Foundation Architecture
site_description: Architecture guidance for an AI-ready data foundation.
theme:
  name: material
  custom_dir: overrides
  language: en
  favicon: assets/images/favicon.svg
  features:
    - announce.dismiss
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.highlight
    - search.suggest
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: blue

extra_css:
  - assets/stylesheets/extra.css

extra:
  docs_version: "0.1.0"

extra_javascript:
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6
  - https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js
  - assets/javascripts/interactive.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true
  - awesome-pages
  - glightbox
  - charts:
      vega_theme_light: default
      vega_theme_dark: dark
      vega_renderer: svg
  - minify:
      minify_html: true

