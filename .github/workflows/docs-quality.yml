name: Documentation quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Build documentation
        run: mkdocs build --strict

      - name: Validate internal links and assets
        run: python scripts/check_internal_links.py site

      - name: Validate Data Foundation Architect skill
        run: |
          python skills/data-foundation-architect/scripts/validate_package.py
          python skills/data-foundation-architect/scripts/validate_examples.py
          python skills/data-foundation-architect/scripts/verify_guidance_map.py
          python -m py_compile \
            skills/data-foundation-architect/scripts/assess_maturity.py \
            skills/data-foundation-architect/scripts/validate_examples.py \
            skills/data-foundation-architect/scripts/validate_package.py \
            skills/data-foundation-architect/scripts/verify_guidance_map.py
          python skills/data-foundation-architect/scripts/assess_maturity.py \
            skills/data-foundation-architect/assets/domain-assessment.example.json \
            --format json > /tmp/domain-assessment-result.json
