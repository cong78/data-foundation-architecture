name: Documentation quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Build documentation
        run: mkdocs build --strict

      - name: Validate internal links and assets
        run: python scripts/check_internal_links.py site

      - name: Validate navigation and spelling
        run: |
          python scripts/check_navigation.py
          python scripts/check_release_readiness.py
          python scripts/validate_architecture_registry.py
          python scripts/build_guidance_graph.py --check
          codespell docs README.md GOVERNANCE.md COMPATIBILITY.md CONTRIBUTING.md SUPPORT.md CHANGELOG.md policies scripts skills \
            --skip='*.svg,*.png,*.jpg,*.drawio,*.json'

      - name: Install Open Policy Agent
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 1.18.2

      - name: Validate architecture policies
        run: |
          python scripts/validate_architecture_policies.py
          opa fmt --fail policies/rego
          opa check --strict policies/rego
          opa test policies/rego -v
          opa eval --fail \
            --data policies/rego/data_product_contract.rego \
            --input policies/inputs/compliant-product.json \
            'data.architecture.data_product_contract.decision.allow'

      - name: Compile repository validators
        run: |
          python -m py_compile scripts/validate_architecture_policies.py
          python -m py_compile scripts/validate_architecture_registry.py
          python -m py_compile scripts/build_guidance_graph.py
          python -m py_compile scripts/check_navigation.py
          python -m py_compile scripts/check_release_readiness.py

      - name: Validate Data Foundation Architect skill
        run: |
          python skills/data-foundation-architect/scripts/validate_package.py
          python skills/data-foundation-architect/scripts/validate_examples.py
          python skills/data-foundation-architect/scripts/verify_guidance_map.py
          python -m py_compile \
            skills/data-foundation-architect/scripts/assess_maturity.py \
            skills/data-foundation-architect/scripts/validate_examples.py \
            skills/data-foundation-architect/scripts/validate_package.py \
            skills/data-foundation-architect/scripts/verify_guidance_map.py
          python skills/data-foundation-architect/scripts/assess_maturity.py \
            skills/data-foundation-architect/assets/domain-assessment.example.json \
            --format json > /tmp/domain-assessment-result.json

      - name: Validate Data Contract Designer skill
        run: |
          python skills/data-contract-designer/scripts/validate_package.py
          python skills/data-contract-designer/scripts/validate_examples.py
          python skills/data-contract-designer/scripts/verify_guidance_map.py
          python -m py_compile \
            skills/data-contract-designer/scripts/assess_compatibility.py \
            skills/data-contract-designer/scripts/validate_examples.py \
            skills/data-contract-designer/scripts/validate_package.py \
            skills/data-contract-designer/scripts/verify_guidance_map.py
          python skills/data-contract-designer/scripts/assess_compatibility.py \
            skills/data-contract-designer/assets/compatibility-before.example.json \
            skills/data-contract-designer/assets/compatibility-after.example.json \
            --format json > /tmp/contract-compatibility-result.json

      - name: Validate Data Foundation Architecture Agent
        run: |
          PYTHONPATH=agent python agent/scripts/validate_agent.py
          PYTHONPATH=agent python agent/scripts/evaluate_agent.py
          PYTHONPATH=agent python -m unittest discover -s agent/tests -v
          python -m py_compile \
            agent/data_foundation_architecture_agent/__init__.py \
            agent/data_foundation_architecture_agent/cli.py \
            agent/data_foundation_architecture_agent/guidance.py \
            agent/data_foundation_architecture_agent/runtime.py \
            agent/scripts/evaluate_agent.py \
            agent/scripts/validate_agent.py \
            agent/tests/test_agent.py
